<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Science Quiz Class 1-9</title>
<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    text-align:center;
}
.container{
    width:60%;
    margin:auto;
    margin-top:30px;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#3498db;
    color:white;
}
button:hover{background:#2980b9;}
.option{
    display:block;
    margin:8px;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container" id="difficultyBox">
    <h2>Select Difficulty</h2>
    <button onclick="startQuiz('easy')">Easy</button>
    <button onclick="startQuiz('normal')">Normal</button>
    <button onclick="startQuiz('hard')">Hard</button>
</div>

<div class="container hidden" id="quizBox">
    <h3 id="questionNumber"></h3>
    <p id="questionText"></p>
    <div id="options"></div>

    <button onclick="prevQuestion()">Previous</button>
    <button onclick="skipQuestion()">Skip</button>
    <button onclick="nextQuestion()">Next</button>
</div>

<div class="container hidden" id="resultBox">
    <h2>Quiz Completed!</h2>
    <p id="scoreText"></p>
    <div id="answersReview"></div>
</div>

<script>
let questions = [];
let currentQuestion = 0;
let userAnswers = [];
let difficultyLevel = "";

// Question banks
const questionBank = {
easy: [
    {q:"Which planet do we live on?",a:["Mars","Earth","Venus","Jupiter"],c:1},
    {q:"Water freezes at?",a:["0°C","50°C","100°C","10°C"],c:0},
    {q:"Which organ helps us breathe?",a:["Heart","Lungs","Brain","Kidney"],c:1},
    {q:"Sun rises in the?",a:["West","North","East","South"],c:2},
    {q:"Plants make food by?",a:["Respiration","Photosynthesis","Digestion","Boiling"],c:1}
],
normal: [
    {q:"Unit of force?",a:["Newton","Joule","Watt","Volt"],c:0},
    {q:"Boiling point of water?",a:["90°C","50°C","100°C","120°C"],c:2},
    {q:"Chemical formula of water?",a:["CO2","O2","H2O","NaCl"],c:2},
    {q:"Largest planet?",a:["Earth","Mars","Jupiter","Saturn"],c:2},
    {q:"Photosynthesis needs?",a:["Oxygen","Carbon dioxide","Nitrogen","Helium"],c:1}
],
hard: [
    {q:"Acceleration due to gravity on Earth?",a:["8.9","9.8","10.5","7.8"],c:1},
    {q:"Newton’s 3rd law states?",a:["F=ma","Action-Reaction","Inertia","Gravity"],c:1},
    {q:"pH of neutral solution?",a:["5","7","9","1"],c:1},
    {q:"SI unit of power?",a:["Joule","Newton","Watt","Pascal"],c:2},
    {q:"Escape velocity of Earth?",a:["11.2 km/s","5 km/s","8 km/s","15 km/s"],c:0}
]
};

function generateQuestions(level){
    let base = questionBank[level];
    let generated = [];
    for(let i=0;i<50;i++){
        let random = base[Math.floor(Math.random()*base.length)];
        generated.push({...random});
    }
    return generated;
}

function startQuiz(level){
    difficultyLevel = level;
    questions = generateQuestions(level);
    userAnswers = new Array(50).fill(null);
    document.getElementById("difficultyBox").classList.add("hidden");
    document.getElementById("quizBox").classList.remove("hidden");
    loadQuestion();
}

function loadQuestion(){
    let q = questions[currentQuestion];
    document.getElementById("questionNumber").innerText = 
        "Question " + (currentQuestion+1) + " of 50";
    document.getElementById("questionText").innerText = q.q;
    let optionsHTML="";
    q.a.forEach((opt,index)=>{
        optionsHTML += `
        <label class="option">
        <input type="radio" name="option" value="${index}"
        ${userAnswers[currentQuestion]==index?"checked":""}
        onchange="selectAnswer(${index})"> ${opt}
        </label>`;
    });
    document.getElementById("options").innerHTML = optionsHTML;
}

function selectAnswer(index){
    userAnswers[currentQuestion]=index;
}

function nextQuestion(){
    if(currentQuestion<49){
        currentQuestion++;
        loadQuestion();
    } else {
        showResults();
    }
}

function prevQuestion(){
    if(currentQuestion>0){
        currentQuestion--;
        loadQuestion();
    }
}

function skipQuestion(){
    nextQuestion();
}

function showResults(){
    document.getElementById("quizBox").classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let score=0;
    let reviewHTML="";
    questions.forEach((q,i)=>{
        let correct = q.c;
        let user = userAnswers[i];
        if(user===correct) score++;
        reviewHTML+=`
        <p><b>Q${i+1}:</b> ${q.q}<br>
        Your Answer: ${user!=null?q.a[user]:"Skipped"}<br>
        Correct Answer: ${q.a[correct]}</p>
        <hr>`;
    });

    document.getElementById("scoreText").innerText=
        "Difficulty: "+difficultyLevel.toUpperCase()+
        " | Score: "+score+" / 50";

    document.getElementById("answersReview").innerHTML=reviewHTML;
}
</script>

</body>
</html>
